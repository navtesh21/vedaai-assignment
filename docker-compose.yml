version: '3.8'

services:
  # ── Databases ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: vedaai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - vedaai-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vedaai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - vedaai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────
  backend:
    image: vedaai-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vedaai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/vedaai
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vedaai-net
    volumes:
      - uploads_data:/app/uploads

  # ── BullMQ Worker ───────────────────────────────────────────
  worker:
    image: vedaai-worker
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: vedaai-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/vedaai
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vedaai-net
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    image: vedaai-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vedaai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_WS_URL=ws://localhost:5000/ws
    depends_on:
      - backend
    networks:
      - vedaai-net

  # ── Reverse Proxy (Nginx) ───────────────────────────────────
  proxy:
    image: nginx:alpine
    container_name: vedaai-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - vedaai-net

# ── Volumes & Networks ──────────────────────────────────────
volumes:
  mongo_data:
  uploads_data:

networks:
  vedaai-net:
    driver: bridge
